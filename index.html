<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #333;
        }

        header {
            background: #111;
            color: white;
            padding: 40px;
            text-align: center;
        }

        nav {
            background: #222;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #00bcd4;
        }

        section {
            padding: 60px 20px;
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 25px;
            margin: 20px 0;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 30px;
            margin-top: 40px;
        }

        h1,h2 {
            margin-top: 0;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            background: #00bcd4;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            margin-top: 15px;
        }

        .btn:hover {
            background: #0097a7;
        }
    </style>
</head>
<body>

<header>
    <h1>Meine Website</h1>
    <p>Willkommen auf meiner ersten echten Website 🚀</p>
</header>

<nav>
    <a href="#about">Über mich</a>
    <a href="projekte.html">Projekte</a>
    <a href="#contact">Kontakt</a>
</nav>

<section id="about">
    <div class="card">
        <h2>Über mich</h2>
        <p>Hier kannst du dich vorstellen. Wer bist du? Was machst du?</p>
    </div>
</section>

<section id="projects">
    <div class="card">
        <h2>Meine Projekte</h2>
        <p>Hier kannst du deine Projekte zeigen.</p>
        <a class="btn" href="#">Projekt ansehen</a>
    </div>
</section>

<section id="contact">
    <div class="card">
        <h2>Kontakt</h2>
        <p>Email: deine@email.de</p>
    </div>
</section>

<footer>
    <p>© 2026 Meine Website</p>
</footer>

</body>
</html>
